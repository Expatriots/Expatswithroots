<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opt Out - EWR</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            margin: 20px 0;
            background: #dc143c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
        }
        .btn:hover {
            background: #b8112e;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚫 Opt Out of Referral Requests</h2>
        <p>Click the button below to confirm you want to stop receiving referral requests from EWR.</p>
        <a href="#" id="optoutLink" class="btn">Confirm Opt-Out</a>
        <p style="font-size: 13px; margin-top: 20px;">You can rejoin anytime through our referrer form.</p>
    </div>

    <script>
        // Extract parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const expatId = urlParams.get('expatId');

        // Google Apps Script URL
        const scriptUrl = 'https://script.google.com/macros/s/AKfycby-D3a_lkkvn9QjqObHs7TxZwcY5IwrAyvCpotTIF2bLqk6bfwv2VNe8bxVg05LrbmBfw/exec';

        // Build redirect URL
        const redirectUrl = `${scriptUrl}?action=optout&expatId=${expatId}`;

        // Set the button link
        document.getElementById('optoutLink').href = redirectUrl;
    </script>
</body>
</html>
