<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accept Referral - EWR</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            margin: 20px 0;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
        }
        .btn:hover {
            background: #218838;
        }
        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🤝 Accept Referral Request</h2>
        <p>Click the button below to confirm you want to accept this referral request.</p>
        <a href="#" id="acceptLink" class="btn">✅ Confirm & Accept</a>
        <p style="font-size: 13px; margin-top: 20px;">You'll be redirected to confirm your response.</p>
    </div>

    <script>
        // Extract parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const requestId = urlParams.get('requestId');
        const expatId = urlParams.get('expatId');

        // Google Apps Script URL
        const scriptUrl = 'https://script.google.com/macros/s/AKfycby-D3a_lkkvn9QjqObHs7TxZwcY5IwrAyvCpotTIF2bLqk6bfwv2VNe8bxVg05LrbmBfw/exec';

        // Build redirect URL
        const redirectUrl = `${scriptUrl}?action=accept&requestId=${requestId}&expatId=${expatId}`;

        // Set the button link
        document.getElementById('acceptLink').href = redirectUrl;
    </script>
</body>
</html>
